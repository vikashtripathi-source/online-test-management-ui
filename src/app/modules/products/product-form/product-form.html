<div class="max-w-3xl mx-auto">
  <!-- Page Header -->
  <div class="mb-8">
    <h1 class="text-4xl font-bold text-gray-800">Create New Test</h1>
    <p class="text-gray-600 mt-2">Set up a new exam for your students</p>
  </div>

  <!-- Form Card -->
  <div class="card">
    <form class="space-y-6">
      <!-- Test Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Test Name *</label>
        <input 
          type="text" 
          placeholder="e.g., Midterm Examination - Mathematics"
          class="input-field"
          required
        >
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Test Description *</label>
        <textarea 
          placeholder="Describe the test content, topics covered, and difficulty level"
          rows="4"
          class="input-field"
          required
        ></textarea>
      </div>

      <!-- Test Details Grid -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Number of Questions -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Number of Questions *</label>
          <input 
            type="number" 
            placeholder="e.g., 50"
            class="input-field"
            required
          >
        </div>

        <!-- Duration in Minutes -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Duration (Minutes) *</label>
          <input 
            type="number" 
            placeholder="e.g., 60"
            class="input-field"
            required
          >
        </div>
      </div>

      <!-- Passing Score -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Passing Score (%)</label>
        <input 
          type="number" 
          placeholder="e.g., 60"
          min="0"
          max="100"
          class="input-field"
        >
      </div>

      <!-- Subject -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Subject/Course *</label>
        <select class="input-field">
          <option value="">Select a subject</option>
          <option value="mathematics">Mathematics</option>
          <option value="english">English Literature</option>
          <option value="science">Science (Physics, Chemistry, Biology)</option>
          <option value="history">History</option>
          <option value="geography">Geography</option>
          <option value="computer">Computer Science</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Test Level -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Difficulty Level</label>
        <select class="input-field">
          <option value="">Select difficulty</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-4 border-t">
        <button 
          type="submit"
          class="btn-primary flex-1 py-3 text-lg font-semibold"
        >
          Create Test
        </button>
        <a 
          routerLink="/products"
          class="btn-secondary flex-1 py-3 text-lg font-semibold text-center"
        >
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
