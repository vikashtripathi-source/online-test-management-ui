<div class="bg-gradient-to-r from-blue-600 to-blue-700 shadow-lg">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <!-- College Logo & Branding -->
    <div class="flex items-center space-x-3">
      <!-- College Icon -->
      <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md">
        <svg class="w-7 h-7 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
          <!-- Graduation Cap -->
          <path d="M12 2c0 0-9 4-9 8.5 0 2.7 4 5.5 9 5.5s9-2.8 9-5.5c0-4.5-9-8.5-9-8.5zm0 11.5c-4.41 0-8-2.01-8-4.5S7.59 5 12 5s8 2.01 8 4.5-3.59 4-8 4zm0 1c-4.41 0-8 2.01-8 4.5V20c0 2.49 3.59 4.5 8 4.5s8-2.01 8-4.5v-2.5c0-2.49-3.59-4.5-8-4.5z"/>
        </svg>
      </div>
      
      <!-- Title -->
      <div class="flex flex-col">
        <h2 class="text-xl font-bold text-white leading-tight">College Test</h2>
        <p class="text-xs text-blue-100">Management System</p>
      </div>
    </div>

    <!-- Admin & Logout Buttons -->
    <div class="flex gap-3 items-center">
      <!-- Show Admin Panel only for admin users -->
      <a 
        *ngIf="isAdmin"
        routerLink="/admin"
        class="px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition duration-200 ease-in-out shadow-md flex items-center gap-2">
        <span>⚙️</span> Admin Panel
      </a>
      
      <!-- Show current user role -->
      <div class="text-sm text-blue-100" *ngIf="currentUser">
        <span *ngIf="isAdmin">{{ currentUser.firstName }} (Admin)</span>
        <span *ngIf="!isAdmin">{{ currentUser.firstName }} (Student)</span>
      </div>
      
      <button 
        (click)="logout()"
        class="px-6 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition duration-200 ease-in-out shadow-md"
      >
        Logout
      </button>
    </div>
  </div>
</div>
